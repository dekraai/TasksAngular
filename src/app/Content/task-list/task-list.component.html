<p>task-list works!</p>
<h2>Tasks I Own</h2>
<div>
    <button (click)="getMyTasks()">get my tasks</button>
    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">id</th>
                <th scope="col">name</th>
                <th scope="col">owner</th>
            </tr>
        </thead>
        <tbody>
            @for (task of TasksIOwn; track task.taskId;) {
            <tr class="table-active">
                <td scope="row" (click)="goToTask(task.taskId)">{{task.taskId}}</td>
                <td scope="row" (click)="goToTask(task.taskId)">{{task.name}}</td>
                <td scope="row" (click)="goToTask(task.taskId)">{{task.ownerId}}</td>
            </tr>
        }
        </tbody>
    </table>
</div>
